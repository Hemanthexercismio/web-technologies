<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" type="text/css" media="screen" href="main.css">
    <script src="main.js"></script>
</head>

<body>

<div name="LoginForm">

    <div>
        <h1>Login Page</h1>
    </div>

    <hr>

    <div>
        <i>Username</i>
        <span>*</span>
        <span>:</span>
        <input type="text" name="usernameForLogin" id="usernameId" required>
    </div>
    <br>

    <div>
        <i>Password</i>
        <span>*</span>
        <span>:</span>
        <input type="password" name="passwordForLogin" id="passwordId" required>
    </div>
    <br>

    <div>
        <button>Login</button>
        <button>Reset</button>
    </div>

</div>

</body>

</html>
