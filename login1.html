<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>User Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" type="text/css" media="screen" href="main.css">
    <script src="main.js"></script>
</head>

<body>

<form name="UserLoginForm">

    <div>
        <h1>User Login Page</h1>
    </div>

    <hr>

    <div>
        <i>Username</i>
        <span>*</span>
        <span>:</span>
        <input type="text" name="userName" id="userNameId" required>
    </div>
    <br>

    <div>
        <i>Password</i>
        <span>*</span>
        <span>:</span>
        <input type="password" name="userPassword" id="passwordId" required>
    </div>
    <br>

    <div>
        <i>Phone Number</i>
        <span>*</span>
        <span>:</span>
        <input type="tel" name="phoneNumber" id="phoneId" required>
    </div>
    <br>

    <div>
        <i>Date of Birth</i>
        <span>:</span>
        <input type="date" name="dob" id="dobId">
    </div>
    <br>

    <div>
        <i>Gender</i>
        <span>:</span>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </div>
    <br>

    <div>
        <i>Remember Me</i>
        <input type="checkbox" name="rememberMe">
    </div>
    <br>

    <div>
        <button>Login</button>
        <button type="reset">Clear</button>
    </div>

</form>

</body>

</html>
