<!DOCTYPE html>
<html>

<head>
<title>Metro Green Line Form</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(to right, #d4f5d4, #ffffff);
    text-align: center;
}

form{
    width: 400px;
    margin: auto;
    padding: 20px;
    background-color: white;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

h1{
    color: rgb(65, 244, 6);
}

h2{
    color: darkgreen;
}

h3{
    color: #2e8b57;
}

input{
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

input[type="submit"]{
    background-color: green;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

input[type="submit"]:hover{
    background-color: rgb(83, 10, 218);
}

</style>

</head>

<body>

<form>

<div>
<h1>Green Line</h1>
<input type="text" placeholder="CITY NAME">
</div>

<div>
<h2>From</h2>
<input type="text" placeholder="From station location">
</div>

<div>
<h2>Destination Location</h2>
<input type="text" placeholder="Enter destination location">
</div>

<div>
<h3>Enter Date</h3>
<input type="date">
<input type="email" placeholder="Enter email">
</div>

<input type="submit" value="Submit">

</form>

</body>

</html>
